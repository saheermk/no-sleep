name: Android CI/CD

# Trigger the workflow on pushes to main, or when a version tag (v1.0.0) is pushed, or manually via the Actions tab.
on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Rename APKs
        run: |
          mv "app/build/outputs/apk/release/app-release-unsigned-signed.apk" "app/build/outputs/apk/release/no sleep.apk"
          mv "app/build/outputs/apk/release/app-release-unsigned.apk" "app/build/outputs/apk/release/no sleep(unsigned).apk"

      - name: Upload Signed APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSleep-Signed-APK
          path: "app/build/outputs/apk/release/no sleep.apk"

      - name: Upload Unsigned APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSleep-Unsigned-APK
          path: "app/build/outputs/apk/release/no sleep(unsigned).apk"

      # Automatically publish a GitHub Release when a tag (e.g., 'v1.0.0') is pushed
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            "app/build/outputs/apk/release/no sleep.apk"
            "app/build/outputs/apk/release/no sleep(unsigned).apk"
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
